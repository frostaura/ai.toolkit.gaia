services:
  gaia-mcp:
    build:
      context: .github/mcp
      dockerfile: Dockerfile
    ports:
      - "${GAIA_MCP_PORT:-5059}:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - GAIA_DATA_DIR=/data
    volumes:
      - gaia-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/mcp | grep -qE '^[2-4]' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  gaia-data:
