services:
  gaia-mcp:
    build:
      context: .github/mcp
      dockerfile: Dockerfile
    ports:
      - "${MCP_PORT:-5059}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
    volumes:
      - gaia-data:/app/data
    restart: unless-stopped

volumes:
  gaia-data:
